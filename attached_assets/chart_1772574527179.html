<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raw Funded — Live Chart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; }

    h2 { color: white; font-size: 20px; margin-bottom: 16px; letter-spacing: 0.5px; }

    #symbol-switcher { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
    #symbol-switcher button {
      background: #1e1e1e; color: #aaa; border: 1px solid #2e2e2e;
      padding: 8px 18px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.2s;
    }
    #symbol-switcher button.active { background: #f0b90b; color: #000; font-weight: bold; border-color: #f0b90b; }
    #symbol-switcher button:hover:not(.active) { border-color: #555; color: white; }

    #view-toggle { margin-bottom: 16px; }
    #view-toggle button {
      background: transparent; color: #666; border: 1px solid #2e2e2e;
      padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 12px; transition: all 0.2s;
    }
    #view-toggle button:hover { color: #aaa; border-color: #444; }
    #view-toggle button.active { color: #f0b90b; border-color: #f0b90b; }

    #main-layout { display: flex; gap: 16px; align-items: flex-start; }
    #chart-container { width: 750px; height: 500px; }

    #trade-panel {
      width: 200px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #trade-panel h3 { color: white; font-size: 14px; text-align: center; letter-spacing: 0.5px; }

    #current-instrument {
      background: #0f0f0f;
      color: #f0b90b;
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #2e2e2e;
    }

    #trade-panel label { color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    #lot-size {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2e2e2e;
      color: white;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }

    #lot-size:focus { outline: none; border-color: #f0b90b; }

    #btn-buy {
      width: 100%;
      padding: 12px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-buy:hover { background: #15803d; }

    #btn-sell {
      width: 100%;
      padding: 12px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-sell:hover { background: #b91c1c; }

    #trade-status {
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #aaa;
    }
    #trade-status.success { color: #16a34a; }
    #trade-status.error { color: #dc2626; }
    #trade-status.loading { color: #f0b90b; }
  </style>
</head>
<body>

  <h2>Raw Funded — Live Chart</h2>

  <div id="symbol-switcher">
    <button onclick="switchSymbol('COINBASE:BTCUSD', 'Bitcoin', this)">⚡ Bitcoin</button>
    <button class="active" onclick="switchSymbol('OANDA:XAUUSD', 'Gold', this)">Gold</button>
    <button onclick="switchSymbol('OANDA:XAGUSD', 'Silver', this)">Silver</button>
    <button onclick="switchSymbol('OANDA:WTICOUSD', 'Oil (WTI)', this)">Oil (WTI)</button>
    <button onclick="switchSymbol('OANDA:SPX500USD', 'S&P 500', this)">S&P 500</button>
    <button onclick="switchSymbol('OANDA:NAS100USD', 'Nasdaq', this)">Nasdaq</button>
    <button onclick="switchSymbol('OANDA:UK100GBP', 'FTSE 100', this)">FTSE 100</button>
  </div>

  <div id="view-toggle">
    <button class="active" onclick="setMode('simple', this)">Simple</button>
    <button onclick="setMode('pro', this)">Pro View</button>
  </div>

  <div id="main-layout">
    <div id="chart-container"></div>

    <div id="trade-panel">
      <h3>Place Order</h3>
      <div id="current-instrument">Gold (XAUUSD)</div>

      <div>
        <label>Lot Size</label>
        <input type="number" id="lot-size" value="0.01" min="0.01" step="0.01" />
      </div>

      <button id="btn-buy" onclick="placeTrade('BUY')">▲ BUY</button>
      <button id="btn-sell" onclick="placeTrade('SELL')">▼ SELL</button>

      <div id="trade-status"></div>
    </div>
  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    const SUPABASE_URL = 'https://bwcifxjkiufyshcsfvim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Y2lmeGpraXVmeXNoY3NmdmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDIwOTcsImV4cCI6MjA4ODA3ODA5N30.5Co24Vib7gQhVRPxYD-0bVTduQ4PkC9FDiFGBXPZzok';

    let currentSymbol = 'OANDA:XAUUSD';
    let currentName = 'Gold (XAUUSD)';
    let currentMode = 'simple';

    const modeConfig = {
      simple: { hide_side_toolbar: true, studies: [], withdateranges: false, save_image: false },
      pro: { hide_side_toolbar: false, studies: ["RSI@tv-basicstudies", "MACD@tv-basicstudies"], withdateranges: true, save_image: true }
    };

    function createChart(symbol, mode) {
      document.getElementById('chart-container').innerHTML = '';
      const cfg = modeConfig[mode];
      new TradingView.widget({
        symbol: symbol,
        interval: "5",
        container_id: "chart-container",
        width: 750,
        height: 500,
        theme: "dark",
        style: "1",
        locale: "en",
        toolbar_bg: "#0f0f0f",
        hide_side_toolbar: cfg.hide_side_toolbar,
        studies: cfg.studies,
        allow_symbol_change: false,
        withdateranges: cfg.withdateranges,
        save_image: cfg.save_image,
        enable_publishing: false,
      });
    }

    function switchSymbol(symbol, name, btn) {
      currentSymbol = symbol;
      currentName = name;
      document.getElementById('current-instrument').textContent = name;
      document.querySelectorAll('#symbol-switcher button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      createChart(currentSymbol, currentMode);
    }

    function setMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('#view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      createChart(currentSymbol, currentMode);
    }

    async function placeTrade(side) {
      const size = parseFloat(document.getElementById('lot-size').value);
      const status = document.getElementById('trade-status');

      if (!size || size <= 0) {
        status.textContent = 'Enter a valid lot size.';
        status.className = 'error';
        return;
      }

      status.textContent = 'Placing order...';
      status.className = 'loading';

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/trades`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            instrument: currentName,
            side: side,
            size: size,
            status: 'pending'
          })
        });

        if (response.ok) {
          status.textContent = `✓ ${side} order placed!`;
          status.className = 'success';
          setTimeout(() => { status.textContent = ''; status.className = ''; }, 3000);
        } else {
          const err = await response.json();
          status.textContent = 'Error: ' + (err.message || 'Unknown error');
          status.className = 'error';
        }
      } catch (e) {
        status.textContent = 'Connection error.';
        status.className = 'error';
      }
    }

    createChart(currentSymbol, currentMode);
  </script>

</body>
</html>
